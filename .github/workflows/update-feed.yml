name: Update feed from RSS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS and update MongoDB
        run: npm run fetch-news
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DB_NAME: feed
