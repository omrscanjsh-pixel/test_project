<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e" id="themeColorMeta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Feed — 소셜 피드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="motion-bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app">
    <header class="header">
      <button class="icon-btn menu-btn acrylic" aria-label="메뉴" id="menuBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </header>

    <main class="feed" id="feed" role="feed" aria-label="최신 피드"></main>
  </div>

  <div class="context-menu acrylic" id="mainMenu" hidden>
    <div class="menu-label">UI 테마</div>
    <button class="menu-item theme-item" data-theme="default">
      <span class="theme-dot theme-dot-default"></span>
      기본 (Fluent)
      <svg class="theme-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <button class="menu-item theme-item" data-theme="dark">
      <span class="theme-dot theme-dot-dark"></span>
      다크 모드
      <svg class="theme-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <button class="menu-item theme-item" data-theme="light">
      <span class="theme-dot theme-dot-light"></span>
      밝은 회색
      <svg class="theme-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
  </div>

  <div class="context-menu acrylic" id="postMenu" hidden>
    <button class="menu-item" data-action="copy">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      링크 복사
    </button>
    <button class="menu-item" data-action="share">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      공유하기
    </button>
    <div class="menu-divider"></div>
    <button class="menu-item danger" data-action="report">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      신고하기
    </button>
  </div>

  <div class="modal-overlay" id="composeModal" hidden>
    <div class="modal acrylic">
      <div class="modal-header">
        <button class="icon-btn modal-close" id="modalClose" aria-label="닫기">&#10005;</button>
        <span class="modal-title">새 스레드</span>
        <button class="btn-primary" id="postBtn" disabled>게시</button>
      </div>
      <div class="modal-body">
        <div class="avatar avatar-lg" style="background: linear-gradient(135deg, #60cdff, #0078d4)">나</div>
        <textarea id="composeText" placeholder="무슨 일이 일어나고 있나요?" rows="4" maxlength="500"></textarea>
      </div>
    </div>
  </div>

  <div class="toast acrylic" id="toast" hidden></div>

  <script src="js/app.js"></script>
</body>
</html>
